          - paragraph [ref=e298]:
            - text: The
            - code [ref=e299]:
              - link "<<intro-prompt-greet>>" [ref=e300] [cursor=pointer]:
                - /url: https://prefix-dev.github.io/rattler-book/introduction/#intro-prompt-greet
              - generic [ref=e301]:
