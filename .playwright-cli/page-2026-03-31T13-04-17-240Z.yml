          - heading "Why build on conda? ¶" [level=2] [ref=e359]:
            - text: Why build on conda?
            - link "¶" [ref=e360] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#why-build-on-conda
          - paragraph [ref=e361]: "Here's why we chose conda as the foundation:"
          - list [ref=e362]:
            - listitem [ref=e363]:
              - strong [ref=e364]: Existing packages.
              - link "conda-forge" [ref=e365] [cursor=pointer]:
                - /url: https://conda-forge.org
              - text: has thousands of packages across Python, R, C++, Fortran, etc. Your language's packages can depend on native libraries that are already packaged on conda-forge.
            - listitem [ref=e366]:
              - strong [ref=e367]: Binary distribution.
              - text: Packages ship as prebuilt binaries per platform. There is no compilation on the user's machine.
            - listitem [ref=e368]:
              - strong [ref=e369]: Isolated environments.
              - text: Environments can be isolated from each other, think of python
              - code [ref=e370]: .venv
              - text: for example but with more native dependency types.
            - listitem [ref=e371]:
              - strong [ref=e372]: Mature tooling.
              - link "rattler" [ref=e373] [cursor=pointer]:
                - /url: https://github.com/conda/rattler
              - text: provides a solver, installer, networking stack, and shell activation in reusable Rust crates.
          - paragraph [ref=e374]: "That said, conda isn't always the right choice:"
          - list [ref=e375]:
            - listitem [ref=e376]:
              - strong [ref=e377]: One version per package
              - text: means dependency resolution is NP-complete and requires a SAT solver. If your ecosystem can tolerate duplicate versions (like Go or Nix), you avoid that complexity.
          - paragraph [ref=e378]: I think that if your language depends on c compilation in any ways, like bindings or extensions then the case that use the conda ecosystem becomes very compelling.
          - paragraph [ref=e379]: Continue on to the next chapter to get started. Or if you are up for getting your hands dirty, read below for more details regarding exercises in the book.
          - heading "Exercises ¶" [level=2] [ref=e380]:
            - text: Exercises
            - link "¶" [ref=e381] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#exercises
