        - article [ref=e156]:
          - heading "Introduction ¶" [level=1] [ref=e157]:
            - text: Introduction
            - link "¶" [ref=e158] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#introduction
          - paragraph [ref=e159]: This book teaches you how to build a package manager. A package manager automates finding, downloading, and installing software libraries so you don't have to track versions and dependencies by hand.
          - paragraph [ref=e160]: "Here is what using the finished tool will look like:"
          - generic [ref=e162]:
            - navigation [ref=e163]:
              - button "Copy to clipboard" [ref=e164] [cursor=pointer]
            - code [ref=e165]: "$ shot init my-app --channel conda-forge --channel ../channel $ shot add lumen $ shot install 1523 repodata records loaded Solved 12 packages in 0.3s ✔ Wrote moonshot.lock (12 packages) ✔ Environment updated in 2.1s Activate with: eval $(shot shell-hook) $ shot run lua -e \"require('lumen').thumbnail('photo.jpg', 128)\""
          - paragraph [ref=e166]:
            - code [ref=e167]: lumen
            - text: is a small Lua module we will build in
            - link "Chapter 10" [ref=e168] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/ch10-build/
            - text: . It wraps ImageMagick's command-line tool, which means it depends on a C library with dozens of native dependencies. The interesting part is not the Lua code itself, but that our package manager handles the entire native dependency chain. Where did
            - code [ref=e169]: lumen
            - text: "come from? We built it with moonshot's other headline command:"
          - generic [ref=e171]:
            - navigation [ref=e172]:
              - button "Copy to clipboard" [ref=e173] [cursor=pointer]
            - code [ref=e174]: "$ shot build --output-dir ../channel Building lumen 0.1.0 (build lua_0) → Installing 1 build dependencies… → Running build script `build.lua` → Packing 2 files… → Indexing channel at ../channel ✔ Built lumen-0.1.0-lua_0.conda package → ../channel/noarch/lumen-0.1.0-lua_0.conda channel → ../channel"
          - paragraph [ref=e175]:
            - text: By the end of this book, you will have built the tool that did all of that, on top of
            - strong [ref=e176]:
              - link "rattler" [ref=e177] [cursor=pointer]:
                - /url: https://github.com/conda/rattler
            - text: ", a library that implements the"
            - link "conda" [ref=e178] [cursor=pointer]:
              - /url: https://docs.conda.io/projects/conda/en/stable/
            - text: package specification in pure Rust.
          - heading "Who this is for ¶" [level=2] [ref=e179]:
            - text: Who this is for
            - link "¶" [ref=e180] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#who-this-is-for
          - paragraph [ref=e181]: "This book is aimed at programmers who:"
          - list [ref=e182]:
            - listitem [ref=e183]: Are curious about how package managers work under the hood.
            - listitem [ref=e184]: Want to understand the rattler library and the conda package ecosystem.
            - listitem [ref=e185]: Are considering building a package manager for their own programming language. Conda's language-agnostic format makes it a surprisingly good foundation.
          - paragraph [ref=e186]:
            - text: You don't need to know anything about conda, packaging, or the Lua programming language. We use
            - link "Lua" [ref=e187] [cursor=pointer]:
              - /url: https://www.lua.org
            - text: (a lightweight scripting language commonly embedded in games and applications) as the target language because it's small and self-contained, but the techniques generalize to any ecosystem.
          - heading "Who am I? ¶" [level=2] [ref=e188]:
            - text: Who am I?
            - link "¶" [ref=e189] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#who-am-i
          - paragraph [ref=e190]:
            - text: This book was mostly produced by me,
            - link "Tim de Jager" [ref=e191] [cursor=pointer]:
              - /url: https://github.com/tdejager/
            - text: . Make sure to read
            - link "this" [ref=e192] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#note-on-generative-ai-usage
            - text: section though.
          - paragraph [ref=e193]:
            - text: I'm a main contributor on
            - link "pixi" [ref=e194] [cursor=pointer]:
              - /url: https://pixi.sh
            - text: and
            - link "rattler" [ref=e195] [cursor=pointer]:
              - /url: https://github.com/conda/rattler
            - text: and I work for
            - link "prefix.dev" [ref=e196] [cursor=pointer]:
              - /url: https://prefix.dev/
            - text: . Previously I worked in both robotics and gaming before switching to package managing.
          - paragraph [ref=e197]: We are very bullishly convinced that conda can serve as not only a good base for building libraries and applications, but also for package managers in general. A conda environment is basically an isolated linux-prefix! So we really wanted to start sharing this with the world.
          - heading "How this book is organized ¶" [level=2] [ref=e198]:
            - text: How this book is organized
            - link "¶" [ref=e199] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#how-this-book-is-organized
          - paragraph [ref=e200]:
            - strong [ref=e201]: Part I
            - text: will build
            - code [ref=e202]: moonshot
            - text: "from scratch. Each chapter will implement one command from start to finish. Mostly following the following order: first the design, then configuration changes, then concepts, then implementation."
          - paragraph [ref=e203]:
            - strong [ref=e204]: Part II
            - text: "allows you to dive deeper into the rattler library itself: the package format, the SAT solver, the networking stack. These chapters stand alone, you can read them in any order."
          - heading "Note on Generative AI usage ¶" [level=2] [ref=e205]:
            - text: Note on Generative AI usage
            - link "¶" [ref=e206] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#note-on-generative-ai-usage
          - paragraph [ref=e207]: "Generative AI, specifically: Claude Opus, was extensively used in the production of this book and to verify that the exercises can be completed. Claude has also been used for writing initial drafts of both code and prose. I did try to set my own rules for Claude to follow and I have done, many, many iterations on the generated text alone and with Claude. All text was heavily edited, appended, and changed by myself to make it as concise as possible."
          - paragraph [ref=e208]: I want to be honest w.r.t to this fact so that you as a reader can decide for yourself how to proceed. This section has been written entirely by hand. Any other way would feel disingenuous to me.
          - heading "What we will build ¶" [level=2] [ref=e209]:
            - text: What we will build
            - link "¶" [ref=e210] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#what-we-will-build
          - paragraph [ref=e211]:
            - text: We are going to build
            - code [ref=e212]: moonshot
            - text: ", a minimal Lua package manager. By the final chapter it will be able to:"
          - generic [ref=e214]:
            - navigation [ref=e215]:
              - button "Copy to clipboard" [ref=e216] [cursor=pointer]
            - code [ref=e217]: "$ shot init my-app # scaffold a new project $ shot add lua \">=5.4\" # add dependencies $ shot install # fetch, solve, and install $ shot shell-hook # activate the environment $ shot run lua script.lua # run inside the environment $ shot build # build a distributable package"
          - paragraph [ref=e218]:
            - text: The full source code lives in the
            - code [ref=e219]: src/
            - text: directory alongside this book in the
            - link "rattler-book repository" [ref=e220] [cursor=pointer]:
              - /url: https://github.com/prefix-dev/rattler-book
            - text: .
          - heading "Getting the source ¶" [level=2] [ref=e221]:
            - text: Getting the source
            - link "¶" [ref=e222] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#getting-the-source
          - paragraph [ref=e223]: "Clone the repository:"
          - generic [ref=e225]:
            - navigation [ref=e226]:
              - button "Copy to clipboard" [ref=e227] [cursor=pointer]
            - code [ref=e228]: git clone https://github.com/prefix-dev/rattler-book cd rattler-book
          - heading "Running the examples ¶" [level=2] [ref=e229]:
            - text: Running the examples
            - link "¶" [ref=e230] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#running-the-examples
          - paragraph [ref=e231]:
            - text: The easiest way to get started is with
            - link "pixi" [ref=e232] [cursor=pointer]:
              - /url: https://pixi.prefix.dev/latest/installation/
            - text: ", which manages the Rust toolchain and all dependencies for you. I know it can be a hassle to install a new tool. I really do! But using pixi can familiarize you with what rattler can empower to build. Additionally, it will hopefully convince you that it's a very useful tool as well."
          - paragraph [ref=e233]: "To test things its easy to run:"
          - generic [ref=e235]:
            - navigation [ref=e236]:
              - button "Copy to clipboard" [ref=e237] [cursor=pointer]
            - code [ref=e238]: "pixi r shot <cmd> # e.g pixi r shot init"
          - paragraph
          - paragraph [ref=e239]:
            - text: The
            - code [ref=e240]: run
            - text: command uses pixi's tasks system to run tasks. In a way the task system is similar to
            - link "mise" [ref=e241] [cursor=pointer]:
              - /url: https://mise.jdx.dev/tasks/
            - text: or
            - link "just" [ref=e242] [cursor=pointer]:
              - /url: https://github.com/casey/just
            - text: .
          - paragraph [ref=e243]: "To just build without running:"
          - generic [ref=e245]:
            - navigation [ref=e246]:
              - button "Copy to clipboard" [ref=e247] [cursor=pointer]
            - code [ref=e248]: "# Installs and runs t pixi run build"
          - paragraph [ref=e249]:
            - text: In our project we use a
            - link "[dev]" [ref=e250] [cursor=pointer]:
              - /url: https://pixi.prefix.dev/latest/build/dev/
              - code [ref=e251]: "[dev]"
            - text: table in
            - code [ref=e252]: pixi.toml
            - text: to pull in the Rust compiler and all build dependencies automatically via the
            - code [ref=e253]: pixi-build-rust
            - text: backend. These can then be used in conjunction with
            - code [ref=e254]: run
            - text: . No manual Rust installation required.
          - paragraph [ref=e255]: "You can also build a distributable conda package:"
          - generic [ref=e257]:
            - navigation [ref=e258]:
              - button "Copy to clipboard" [ref=e259] [cursor=pointer]
            - code [ref=e260]: pixi build
          - paragraph [ref=e261]:
            - text: You can also install
            - code [ref=e262]: moonshot
            - text: "globally:"
          - generic [ref=e264]:
            - navigation [ref=e265]:
              - button "Copy to clipboard" [ref=e266] [cursor=pointer]
            - code [ref=e267]: "pixi global install --path . # it will be available as: shot init"
          - paragraph [ref=e268]: Again, pixi automatically figures out what to install and how to build it.
          - heading "Without pixi ¶" [level=3] [ref=e269]:
            - text: Without pixi
            - link "¶" [ref=e270] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#without-pixi
          - paragraph [ref=e271]:
            - text: If you prefer to manage Rust yourself, you need Rust 1.82 or later. Install it with
            - link "rustup" [ref=e272] [cursor=pointer]:
              - /url: https://rustup.rs
            - text: "and build with cargo:"
          - generic [ref=e274]:
            - navigation [ref=e275]:
              - button "Copy to clipboard" [ref=e276] [cursor=pointer]
            - code [ref=e277]: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh cargo build
          - heading "Literate programming ¶" [level=2] [ref=e278]:
            - text: Literate programming
            - link "¶" [ref=e279] [cursor=pointer]:
              - /url: https://prefix-dev.github.io/rattler-book/introduction/#literate-programming
          - paragraph [ref=e280]:
            - text: This book uses
            - link "Entangled" [ref=e281] [cursor=pointer]:
              - /url: https://entangled.github.io/
            - text: ", a literate programming tool. The code blocks in each chapter are the actual source code. Entangled extracts them from the Markdown into real files that compile and run."
          - paragraph [ref=e282]:
            - text: Code blocks that produce a file carry a
            - code [ref=e283]: file=
            - text: "attribute. Here is a small (fake) program we will use to show how it works:"
          - paragraph
          - generic [ref=e284]:
            - generic [ref=e285]:
              - text: "file: examples/intro/hello.rs"
              - button "View examples/intro/hello.rs in source viewer" [ref=e286] [cursor=pointer]: </>
            - generic [ref=e287]:
